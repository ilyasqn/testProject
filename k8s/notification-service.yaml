apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-config
  namespace: pet
data:
  DB__URL: "postgresql+asyncpg://postgres:admin@notification-db:5432/notification_db"
  RABBITMQ__URL: "amqp://guest:guest@rabbitmq:5672/"
  TELEGRAM__BOT_TOKEN: "8553897153:AAHZnz_Sw8tDMAjVuCYZ97ESkU8zKwBLJao"
  TELEGRAM__CHAT_ID: "864278487"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: pet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: notification-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8003
          envFrom:
            - configMapRef:
                name: notification-service-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /docs
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: pet
spec:
  selector:
    app: notification-service
  ports:
    - port: 8003
      targetPort: 8003
  type: ClusterIP
