apiVersion: v1
kind: ConfigMap
metadata:
  name: order-service-config
  namespace: pet
data:
  DB__URL: "postgresql+asyncpg://postgres:admin@order-db:5432/order_db"
  JWT__SECRET_KEY: "382ca91f3321b96c83b412e8c058c8006521e6156b995c1d25d659481551d708"
  JWT__ALGORITHM: "HS256"
  RABBITMQ__URL: "amqp://guest:guest@rabbitmq:5672/"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: pet
spec:
  replicas: 4
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: order-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8004
          envFrom:
            - configMapRef:
                name: order-service-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /docs
              port: 8004
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: pet
spec:
  selector:
    app: order-service
  ports:
    - port: 8004
      targetPort: 8004
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: order-service-hpa
  namespace: pet
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
